<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>피드 작성 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="top-actions" style="gap:6px">
          <button class="pill" onclick="window.location.href='/'">←</button>
        </div>
        <div style="font-weight:900">피드 작성</div>
        <div class="top-actions">
          <button class="pill primary" id="submitBtn" onclick="uploadFeed()">올리기</button>
        </div>
      </header>

      <main class="form" style="padding-top:14px">
        <div class="tag"># <span id="tagText" mission="{{mission._id}}">{{ mission.content }}</span></div>

        <form method="post" enctype="multipart/form-data">
          <div class="drop" id="drop" onclick="openFilePicker()">
            <div>
              <div style="font-weight:900; color:#111827; margin-bottom:6px;">사진을 첨부하세요</div>
              <small>탭해서 업로드</small>
            </div>
          </div>
          <input type="file" id="file" accept="image/*" class="hidden" onchange="previewImage()" />
        </form>


        <div class="preview" id="preview">
          <img id="previewImg" alt="미리보기" />
          <button type="button" class="btn" id="removeBtn" onclick="clearPreview()">사진 다시 선택</button>
        </div>

        <div class="help">
          한 번 올린 피드는 수정이 불가능합니다.<br />
          하나의 챌린지에는 한 개의 피드만 올릴 수 있습니다.
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    function openFilePicker() {
      $('#file').click();
    }

    function previewImage() {
      var file = $('#file')[0].files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        $('#previewImg').attr('src', e.target.result);
        $('#preview').show();
        $('#drop').hide();
      };
      reader.readAsDataURL(file);
    }

    function clearPreview() {
      $('#previewImg').attr('src', '');
      $('#preview').hide();
      $('#drop').show();
      $('#file').val('');
    }

    function uploadFeed() {
      var fileInput = $('#file')[0];
      if (fileInput.files.length === 0) {
        alert("파일을 선택해주세요.");
        return;
      }

      var formData = new FormData();
      formData.append('image', fileInput.files[0]);
      formData.append('missionId', '{{ mission._id }}');

      $.ajax({
        type: 'POST',
        url: '/post',
        data: formData,
        contentType: false,
        processData: false,
        success: function (response) {
          if (response['result'] === 'failure') {
            alert(response['msg']);
            return;
          }
          alert(response['msg']);
          window.location.href = '/';
        },
      });
    }
  </script>
</body>

</html>
