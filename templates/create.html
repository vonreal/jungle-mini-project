<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>피드 작성 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="top-actions" style="gap:6px">
          <button class="pill" onclick="navBack('index.html')">←</button>
        </div>
        <div style="font-weight:900">피드 작성</div>
        <div class="top-actions">
          <button class="pill primary" id="submitBtn">올리기</button>
        </div>
      </header>

      <main class="form" style="padding-top:14px">
        <div class="tag"># <span id="tagText" mission="{{mission._id}}">{{ mission.content }}</span></div>

        <form method="post" enctype="multipart/form-data">
          <div class="drop" id="drop">
            <div>
              <div style="font-weight:900; color:#111827; margin-bottom:6px;">사진을 첨부하세요</div>
              <small>탭해서 업로드</small>
            </div>
          </div>
          <input type="file" id="file" accept="image/*" class="hidden" />
        </form>


        <div class="preview" id="preview">
          <img id="previewImg" alt="미리보기" />
        </div>

        <div class="help">
          한 번 올린 피드는 수정이 불가능합니다.<br />
          하나의 챌린지에는 한 개의 피드만 올릴 수 있습니다.
        </div>
      </main>
    </div>
  </div>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/create.js"></script>
</body>

</html>
