<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>마이페이지 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="top-actions" style="gap:6px">
          <button class="pill" onclick="navBack('index.html')">←</button>
        </div>
        <div style="font-weight:900">마이페이지</div>
        <div class="top-actions">
          <button class="pill" id="logoutBtn">로그아웃</button>
        </div>
      </header>

      <main class="profile">
        <div class="prof-card">
          <img class="big-avatar" id="myAvatar" src="assets/img/avatar.jpg" alt="프로필" />
          <div style="flex:1">
            <div class="nick" id="myNick">김타코</div>
            <button class="btn" style="margin-top:10px; padding:10px 12px;" onclick="window.location.href='profile_edit.html'">프로필 편집</button>
          </div>
        </div>

        <div class="statbox">
          <div class="stat">
            <div class="n" id="statPosts">54</div>
            <div class="t">참여한 챌린지</div>
          </div>
          <div class="stat">
            <div class="n" id="statLikes">{{totalLikes}}</div>
            <div class="t">받은 좋아요</div>
          </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:6px 0 10px; color:var(--muted); font-size:12px;">
          <span style="font-weight:900; color:var(--text);">내 피드</span>
        </div>

        <div class="grid" id="grid"></div>
      </main>

      <div class="bottom-nav">
        <button class="nav-icon" aria-label="홈" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
    </svg></button>
      </div>

    </div>
  </div>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/mypage.js"></script>
  
</body>
</html>
