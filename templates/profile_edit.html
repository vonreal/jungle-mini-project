<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>프로필 수정 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="top-actions" style="gap:6px">
          <button class="pill" onclick="navBack('mypage.html')">취소</button>
        </div>
        <div style="font-weight:900">프로필 수정</div>
        <div class="top-actions">
          <button class="pill primary" id="doneBtn">완료</button>
        </div>
      </header>

      <main class="form" style="padding-top:14px">
        <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
          <img src="assets/img/avatar.jpg" id="avatarPrev" class="big-avatar" style="width:86px;height:86px;" alt="프로필" />
          <div style="display:flex; gap:14px; font-size:12px;">
            <label style="color:var(--primary); font-weight:900; cursor:pointer;">
              이미지 변경
              <input type="file" id="avatarFile" accept="image/*" class="hidden" />
            </label>
            <button id="avatarReset" style="border:none; background:transparent; color:var(--muted); font-weight:900; cursor:pointer;">기본 이미지</button>
          </div>
        </div>

        <div class="field" style="margin-top:16px;">
          <input class="input" id="nickname" placeholder="닉네임" />
        </div>
      </main>
    </div>
  </div>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/profile_edit.js"></script>
</body>
</html>
