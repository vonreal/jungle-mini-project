<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>프로필 수정 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="top-actions" style="gap:6px">
          <button class="pill" onclick="window.location.href='/mypage'">취소</button>
        </div>
        <div style="font-weight:900">프로필 수정</div>
        <div class="top-actions">
          <button class="pill primary" id="doneBtn">완료</button>
        </div>
      </header>

      <main class="form" style="padding-top:14px">
        <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
          <img src="{{profileImg}}" id="avatarPrev" class="big-avatar" style="width:86px;height:86px;" alt="프로필" />
          <div style="display:flex; gap:14px; font-size:12px;">
            <label style="color:var(--primary); font-weight:900; cursor:pointer;">
              이미지 변경
              <input type="file" id="avatarFile" accept="image/*" class="hidden" />
            </label>
            <button id="avatarReset"
              style="border:none; background:transparent; color:var(--muted); font-weight:900; cursor:pointer;">기본
              이미지</button>
          </div>
        </div>

        <div class="field" style="margin-top:16px;">
          <input class="input" id="nickname" placeholder="닉네임" value="{{ nickname }}" />
        </div>
      </main>

    </div>
  </div>


  <script>
    jQuery(function ($) {
      let isDefaultImage = false;

      // 이미지 변경 시
      $("#avatarFile").change(function (e) {
        isDefaultImage = false;
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            $("#avatarPrev").attr("src", e.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      // 기본 이미지 버튼 클릭 시
      $("#avatarReset").click(function () {
        isDefaultImage = true;
        $("#avatarPrev").attr("src", "/assets/img/avatar.jpg");
        $("#avatarFile").val("");
      });

      $("#doneBtn").click(function () {
        const nickname = $("#nickname").val().trim();
        const file = $("#avatarFile")[0].files[0];

        const formData = new FormData();
        formData.append("nickname", nickname);
        formData.append("is_default", isDefaultImage);

        if (file) {
          formData.append("image", file);
        }

        $.ajax({
          type: "POST",
          url: "/mypage/update_mypage",
          data: formData,
          processData: false,
          contentType: false,
          success: function (response) {
            if (response["result"] === "success") {
              alert(response["msg"]);
              window.location.href = "/mypage";
            } else {
              alert(response["msg"]);
            }
          }
        });
      });
    });
  </script>
</body>

</html>
