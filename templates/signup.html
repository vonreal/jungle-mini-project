<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">찍어봐, 오늘</div>
          <div class="sub">회원가입</div>
        </div>
        <div class="top-actions">
          <button class="pill" onclick="window.location.href='/'">닫기</button>
        </div>
      </header>

      <main class="form">
        <h1>찍어봐, 오늘</h1>

        <div class="field">
          <input class="input" id="username" placeholder="아이디" />
          <span class="field-error" id="err-username"></span>
        </div>
        <div class="field">
          <input class="input" id="password" type="password" placeholder="비밀번호" />
          <span class="field-error" id="err-password"></span>
        </div>
        <div class="field">
          <input class="input" id="password2" type="password" placeholder="비밀번호 확인" />
          <span class="field-error" id="err-password2"></span>
        </div>
        <div class="field">
          <input class="input" id="nickname" placeholder="닉네임" />
          <span class="field-error" id="err-nickname"></span>
        </div>

        <button class="btn primary" id="signupBtn">회원가입</button>

        <div class="linkline" style="margin-top:14px;">
          이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
      </main>
    </div>
  </div>


  <style>
    .field-error {
      display: block;
      color: #e53935;
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
    }
    .input.is-error {
      border-color: #e53935;
    }
  </style>

  <script>
    jQuery(function ($) {
      function setError(inputId, errId, msg) {
        $("#" + inputId).addClass("is-error");
        $("#" + errId).text(msg);
      }
      function clearError(inputId, errId) {
        $("#" + inputId).removeClass("is-error");
        $("#" + errId).text("");
      }
      function clearAllErrors() {
        ["username", "password", "password2", "nickname"].forEach(function (id) {
          clearError(id, "err-" + id);
        });
      }

      // 입력할 때 해당 필드 에러 실시간 제거
      $("#username, #password, #password2, #nickname").on("input", function () {
        const id = this.id;
        clearError(id, "err-" + id);
      });

      $("#signupBtn").click(function () {
        clearAllErrors();

        const username = $("#username").val().trim();
        const pw1 = $("#password").val().trim();
        const pw2 = $("#password2").val().trim();
        const nick = $("#nickname").val().trim();

        let hasError = false;

        if (!username) { setError("username", "err-username", "아이디를 입력해주세요."); hasError = true; }
        if (!pw1)      { setError("password", "err-password", "비밀번호를 입력해주세요."); hasError = true; }
        if (!pw2)      { setError("password2", "err-password2", "비밀번호 확인을 입력해주세요."); hasError = true; }
        if (!nick)     { setError("nickname", "err-nickname", "닉네임을 입력해주세요."); hasError = true; }
        if (hasError) return;

        const idRegex = /^[a-z0-9_-]{5,20}$/;
        if (!idRegex.test(username)) {
          setError("username", "err-username", "5~20자의 영문 소문자, 숫자, 특수기호(_)(-)만 사용 가능합니다.");
          return;
        }

        const pwRegex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[~!@#$%^&*()\-=_+])[A-Za-z\d~!@#$%^&*()\-=_+]{8,16}$/;
        if (!pwRegex.test(pw1)) {
          setError("password", "err-password", "8~16자, 영문·숫자·특수문자(~!@#$%^&*()-=_+)를 각각 최소 1개 포함해야 합니다.");
          return;
        }

        if (pw1 !== pw2) {
          setError("password2", "err-password2", "비밀번호가 일치하지 않습니다.");
          return;
        }

        const nickRegex = /^[a-zA-Z가-힣]{1,16}$/;
        if (!nickRegex.test(nick)) {
          setError("nickname", "err-nickname", "한글 또는 영문 1~16자로 입력해주세요. (숫자·특수문자 불가)");
          return;
        }

        $.ajax({
          type: "POST",
          url: "/register",
          data: { username: username, password: pw1, nickname: nick },
          success: function (response) {
            if (response['result'] === 'success') {
              alert(response['msg']);
              window.location.href = '/login';
            } else {
              // 서버 중복 에러 — fields 객체로 각 필드에 인라인 표시
              const fields = response['fields'] || {};
              if (fields.username) setError("username", "err-username", fields.username);
              if (fields.password) setError("password", "err-password", fields.password);
              if (fields.nickname) setError("nickname", "err-nickname", fields.nickname);
              if (!fields.username && !fields.password && !fields.nickname) alert(response['msg'] || "오류가 발생했습니다.");
            }
          },
          error: function () {
            alert("서버 통신 오류가 발생했습니다.");
          }
        });
      });
    });
  </script>

</body>

</html>
