<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 · 찍어봐, 오늘</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>
  <div class="phone">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">찍어봐, 오늘</div>
          <div class="sub">회원가입</div>
        </div>
        <div class="top-actions">
          <button class="pill" onclick="window.location.href='index.html'">닫기</button>
        </div>
      </header>

      <main class="form">
        <h1>찍어봐, 오늘</h1>

        <div class="field">
          <input class="input" id="username" placeholder="아이디" />
        </div>
        <div class="field">
          <input class="input" id="password" type="password" placeholder="비밀번호" />
        </div>
        <div class="field">
          <input class="input" id="password2" type="password" placeholder="비밀번호 확인" />
        </div>
        <div class="field">
          <input class="input" id="nickname" placeholder="닉네임" />
        </div>

        <button class="btn primary" id="signupBtn">회원가입</button>

        <div class="linkline" style="margin-top:14px;">
          이미 계정이 있으신가요? <a href="login.html">로그인</a>
        </div>
      </main>
    </div>
  </div>

  <!-- <script src="assets/js/common.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/signup.js"></script> -->

  <script>
    $(document).ready(function () {
      $("#signupBtn").click(function () {
        const username = $("#username").val().trim();
        const pw1 = $("#password").val().trim();
        const pw2 = $("#password2").val().trim();
        const nick = $("#nickname").val().trim();

        if (!username || !pw1 || !pw2 || !nick) {
          alert("모든 항목을 입력해주세요.");
          return;
        }

        if (pw1 !== pw2) {
          alert("비밀번호가 일치하지 않습니다.");
          return;
        }

        $.ajax({
          type: "POST",
          url: "/register",
          data: {
            username: username,
            password: pw1,
            nickname: nick
          },
          success: function (response) {
            if (response['result'] === 'success') {
              alert(response['msg']);
              window.location.href = '/login';
            } else {
              alert(response['msg']);
            }
          },
          error: function () {
            alert("서버 통신 오류가 발생했습니다.");
          }
        });
      });
    });
  </script>

</body>

</html>
